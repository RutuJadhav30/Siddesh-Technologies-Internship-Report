<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="layout">

    <div class="sidebar">
        <h2>Voting Panel</h2>
        <ul>
            <li><a th:href="@{/user/dashboard}">Dashboard</a></li>
        </ul>
        <a th:href="@{/logout}" class="logout">Logout</a>
    </div>

    <div class="main">

        <div class="header">
            <h1>Cast Your Vote</h1>
        </div>

        <div class="card-grid">
            <div class="card" th:each="c : ${candidates}">
                <h3 th:text="${c.name}"></h3>

                <form th:action="@{/user/vote}" method="post">
                    <input type="hidden" name="id" th:value="${c.id}">
                    <button class="btn"
                        th:disabled="${hasVoted or !electionActive}">
                        Vote
                    </button>
                </form>
            </div>
        </div>

    </div>

</div>

</body>
</html>
